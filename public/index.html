<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StdOut Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="grid-bg"></div>

  <div class="container">
    <div class="header">
      <svg class="logo-svg" width="80" height="80" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="28" fill="#0E0E18"/>
        <circle cx="32" cy="32" r="28" stroke="url(#stdout-ring)" stroke-width="2"/>
        <path d="M22 24L30 32L22 40" stroke="#FB923C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M34 40H44" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/>
        <defs>
          <linearGradient id="stdout-ring" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FB923C"/>
            <stop offset="1" stop-color="#C2410C" stop-opacity="0.4"/>
          </linearGradient>
        </defs>
      </svg>
      <h1>Installation Setup</h1>
      <p class="subtitle">Welcome! Let's get StdOut running on your device.</p>
    </div>

    <!-- Setup Form (shown before installation starts) -->
    <form id="setup-form" class="setup-form">
      <div class="form-group">
        <label for="license-key">License Key</label>
        <input
          type="text"
          id="license-key"
          required
          placeholder="SL-XXXX-XXXX-XXXX-XXXX"
          pattern="SL-[A-Za-z0-9\.\-]+"
          autocomplete="off"
          spellcheck="false"
        >
        <small>Enter your StdOut license key from your purchase email</small>
      </div>

      <div class="form-group">
        <label for="admin-email">Admin Email</label>
        <input type="email" id="admin-email" required placeholder="admin@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="admin-password">Admin Password</label>
        <input type="password" id="admin-password" required placeholder="Minimum 8 characters" autocomplete="new-password">
        <small>Must be at least 8 characters</small>
      </div>

      <div class="form-group">
        <label for="environment-name">Environment Name</label>
        <input type="text" id="environment-name" placeholder="Production" value="Production" autocomplete="off">
      </div>

      <button type="submit" class="btn-primary">Start Installation</button>
    </form>
  </div>

  <script src="/setup.js"></script>
</body>
</html>
