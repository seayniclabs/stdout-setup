<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StdOut Setup</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">StdOut</div>
      <h1>Installation Setup</h1>
      <p class="subtitle">Welcome! Let's get StdOut running on your device.</p>
    </div>

    <!-- Setup Form (shown before installation starts) -->
    <form id="setup-form" class="setup-form">
      <div class="form-group">
        <label for="admin-email">Admin Email</label>
        <input type="email" id="admin-email" required placeholder="admin@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="admin-password">Admin Password</label>
        <input type="password" id="admin-password" required placeholder="Minimum 8 characters" autocomplete="new-password">
        <small>Must be at least 8 characters</small>
      </div>

      <div class="form-group">
        <label for="environment-name">Environment Name</label>
        <input type="text" id="environment-name" placeholder="Production" value="Production" autocomplete="off">
      </div>

      <button type="submit" class="btn-primary">Start Installation</button>
    </form>
  </div>

  <script src="/setup.js"></script>
</body>
</html>
