<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StdOut Installation</title>
    <style>
        :root {
            /* StdOut Brand Colors */
            --accent: #F97316;
            --accent-light: #FB923C;
            --accent-btn: #C2410C;
            --bg: #07070C;
            --bg-surface: #0E0E18;
            --bg-elevated: #151522;
            --border: #1F1F35;
            --text: #F0F0F8;
            --text-secondary: #A0A0B8;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
            color: var(--text);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Sci-Fi Grid Background */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(249, 115, 22, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
            z-index: 1;
            top: -50%;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 800px; }
        }

        /* Cinematic Container */
        .installer-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 80%;
            max-width: 600px;
        }

        /* Glowing Core Animation */
        .core-loader {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 40px;
        }

        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(249, 115, 22, 0.15);
        }

        .ring-outer {
            border-top-color: var(--accent);
            animation: spinClockwise 2s linear infinite;
        }

        .ring-inner {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-bottom-color: var(--accent-light);
            animation: spinCounterClockwise 1.5s linear infinite;
        }

        /* Logo in center */
        .logo-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 64px;
            height: 64px;
            opacity: 0.9;
        }

        @keyframes spinClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinCounterClockwise {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        /* Typography & Progress */
        h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 4px rgba(249, 115, 22, 0.3);
            margin-bottom: 5px;
        }

        .status-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
            min-height: 40px;
        }

        /* Cinematic Progress Bar */
        .progress-frame {
            width: 100%;
            height: 6px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 2px;
            box-shadow: 0 0 5px rgba(249, 115, 22, 0.08);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-btn), var(--accent));
            box-shadow: 0 0 8px rgba(249, 115, 22, 0.4);
            transition: width 0.4s ease-out;
        }

        .percentage {
            margin-top: 15px;
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: bold;
        }

        /* Step indicator */
        .step-indicator {
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="installer-container">
        <div class="core-loader">
            <div class="ring ring-outer"></div>
            <div class="ring ring-inner"></div>
            <svg class="logo-center" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="28" fill="#0E0E18"/>
                <circle cx="32" cy="32" r="28" stroke="url(#stdout-ring)" stroke-width="2"/>
                <path d="M22 24L30 32L22 40" stroke="#FB923C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M34 40H44" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/>
                <defs>
                    <linearGradient id="stdout-ring" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#FB923C"/>
                        <stop offset="1" stop-color="#C2410C" stop-opacity="0.4"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <h1>StdOut Installer</h1>
        <div class="status-text" id="status">Connecting to setup server...</div>

        <div class="progress-frame">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div class="percentage" id="percent">0%</div>
        <div class="step-indicator" id="step">Step 0/8</div>
    </div>

    <script>
        // Connect to SSE stream
        const eventSource = new EventSource('/api/setup/stream');
        const progressBar = document.getElementById('progress');
        const percentText = document.getElementById('percent');
        const statusText = document.getElementById('status');
        const stepText = document.getElementById('step');

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log('[SSE]', data);

            switch (data.type) {
                case 'connected':
                    statusText.textContent = 'Connected to setup server. Waiting for installation to begin...';
                    break;

                case 'step_start':
                    statusText.textContent = data.name || 'Processing...';
                    stepText.textContent = `Step ${data.step}/8: ${data.name}`;
                    break;

                case 'step_complete':
                    progressBar.style.width = `${data.progress}%`;
                    percentText.textContent = `${data.progress}%`;
                    break;

                case 'output':
                    // Show detailed progress messages
                    if (data.message) {
                        statusText.textContent = data.message;
                    }
                    break;

                case 'error':
                    statusText.style.color = '#FF6B6B';
                    statusText.textContent = `Error: ${data.error}`;
                    eventSource.close();
                    break;

                case 'complete':
                    progressBar.style.width = '100%';
                    percentText.textContent = '100%';
                    statusText.style.color = '#00D4AA';
                    statusText.textContent = 'Installation Complete! StdOut is ready.';
                    stepText.textContent = 'Redirecting to your dashboard...';

                    setTimeout(() => {
                        window.location.href = data.url || 'http://stdout.local:8112';
                    }, 2000);
                    break;
            }
        };

        eventSource.onerror = (error) => {
            console.error('[SSE] Connection error:', error);
            statusText.style.color = '#ff4444';
            statusText.textContent = 'Connection lost. Please refresh the page.';
            eventSource.close();
        };
    </script>
</body>
</html>
