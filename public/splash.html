<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StdOut Installation</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-blue: #0044ff;
            --dark-bg: #0a0b10;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Sci-Fi Grid Background */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
            z-index: 1;
            top: -50%;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 800px; }
        }

        /* Cinematic Container */
        .installer-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 80%;
            max-width: 600px;
        }

        /* Glowing Core Animation */
        .core-loader {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 40px;
        }

        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .ring-outer {
            border-top-color: var(--neon-cyan);
            animation: spinClockwise 2s linear infinite;
        }

        .ring-inner {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-bottom-color: var(--neon-blue);
            animation: spinCounterClockwise 1.5s linear infinite;
        }

        @keyframes spinClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinCounterClockwise {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        /* Typography & Progress */
        h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            margin-bottom: 5px;
        }

        .status-text {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 25px;
            height: 20px;
        }

        /* Cinematic Progress Bar */
        .progress-frame {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 2px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: width 0.4s ease-out;
        }

        .percentage {
            margin-top: 15px;
            font-size: 1.2rem;
            color: var(--neon-cyan);
            font-weight: bold;
        }

        /* Step indicator */
        .step-indicator {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="installer-container">
        <div class="core-loader">
            <div class="ring ring-outer"></div>
            <div class="ring ring-inner"></div>
        </div>

        <h1>StdOut Installer</h1>
        <div class="status-text" id="status">Connecting to setup server...</div>

        <div class="progress-frame">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div class="percentage" id="percent">0%</div>
        <div class="step-indicator" id="step">Step 0/8</div>
    </div>

    <script>
        // Connect to SSE stream
        const eventSource = new EventSource('/api/setup/stream');
        const progressBar = document.getElementById('progress');
        const percentText = document.getElementById('percent');
        const statusText = document.getElementById('status');
        const stepText = document.getElementById('step');

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log('[SSE]', data);

            switch (data.type) {
                case 'connected':
                    statusText.textContent = 'Connected. Waiting for installation to begin...';
                    break;

                case 'step_start':
                    statusText.textContent = data.name;
                    stepText.textContent = `Step ${data.step}/8`;
                    break;

                case 'step_complete':
                    progressBar.style.width = `${data.progress}%`;
                    percentText.textContent = `${data.progress}%`;
                    break;

                case 'output':
                    // Optional: show detailed output in status
                    break;

                case 'error':
                    statusText.style.color = '#ff4444';
                    statusText.textContent = `Error: ${data.error}`;
                    eventSource.close();
                    break;

                case 'complete':
                    progressBar.style.width = '100%';
                    percentText.textContent = '100%';
                    statusText.style.color = '#00ff66';
                    statusText.textContent = 'Installation Complete!';
                    stepText.textContent = 'Redirecting to StdOut...';

                    setTimeout(() => {
                        window.location.href = data.url || 'http://stdout.local:8112';
                    }, 2000);
                    break;
            }
        };

        eventSource.onerror = (error) => {
            console.error('[SSE] Connection error:', error);
            statusText.style.color = '#ff4444';
            statusText.textContent = 'Connection lost. Please refresh the page.';
            eventSource.close();
        };
    </script>
</body>
</html>
